{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<style>
    .top_destinations img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* Image zoom on hover */
    .dest_box img {
        transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .dest_box:hover img {
        transform: scale(1.1);
    }

    /* Red overlay smooth transition */
    .dest_box::after {
        transition: opacity 0.4s ease;
    }

    /* Destinations text glass effect */
    .dest_text_center h3 {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
        display: inline-block;
        padding: 5px 15px;
        border-radius: 8px;
        font-size: 1.2rem;
        transition: all 0.3s ease;
    }

    .dest_box:hover .dest_text_center h3 {
        background: #dc3545;
        /* Bootstrap Red on Hover */
        transform: translateY(-5px);
    }

    /* Pulsating Effect for Book Now Button */
    .btn-pulse {
        animation: pulse-red 2s infinite;
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
        transition: transform 0.3s ease;
    }

    @keyframes pulse-red {
        0% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
        }

        70% {
            transform: scale(1);
            box-shadow: 0 0 0 15px rgba(220, 53, 69, 0);
        }

        100% {
            transform: scale(0.95);
            box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
        }
    }

    /* Hover par animation fast ho jayegi */
    .btn-pulse:hover {
        animation: none;
        transform: scale(1.1);
        background-color: #c82333;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
</style>
{% endblock %}
<!-- Top Destinations Sction Start  -->
